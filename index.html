<head>

    <title>Étienne</title>

    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

<style>
:root {
    --safe-top: env(safe-area-inset-top, 47px);
    --safe-bottom: env(safe-area-inset-bottom, 34px);
    --accent: #0a84ff;
    --green: #30d158;
    --purple: #bf5af2;
    --orange: #ff9f0a;
    --red: #ff453a;
    --bg: #000;
    --bg2: #1c1c1e;
    --bg3: #2c2c2e;
    --text: #fff;
    --muted: #8e8e93;
    --border: rgba(255,255,255,0.1);
}
*, *::before, *::after {
    margin: 0; padding: 0;
    box-sizing: border-box;
    -webkit-tap-highlight-color: rgba(10,132,255,0.2);
    -webkit-touch-callout: none;
}
html, body {
    width: 100%; height: 100%;
    overflow: hidden;
    background: var(--bg);
}
body {
    font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Text', 'Helvetica Neue', sans-serif;
    color: var(--text);
    display: flex;
    flex-direction: column;
    height: 100vh;
    height: 100dvh;
    max-width: 430px;
    margin: 0 auto;
    position: relative;
}

/* STATUS BAR */
.status-bar {
    height: var(--safe-top);
    min-height: 47px;
    background: rgba(0,0,0,0.95);
    flex-shrink: 0;
    display: flex;
    align-items: flex-end;
    justify-content: space-between;
    padding: 0 20px 6px;
}
.status-time { font-size: 15px; font-weight: 700; }
.status-icons { display: flex; gap: 6px; align-items: center; }
.status-icons svg { width: 16px; height: 16px; fill: white; }

/* NAV BAR */
.nav {
    display: flex;
    align-items: center;
    padding: 8px 16px 10px;
    background: rgba(0,0,0,0.92);
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    border-bottom: 0.5px solid var(--border);
    flex-shrink: 0;
    gap: 12px;
    position: relative;
    z-index: 10;
}
.nav-back {
    color: var(--accent);
    font-size: 17px;
    display: flex;
    align-items: center;
    gap: 3px;
    min-width: 60px;
    cursor: pointer;
    touch-action: manipulation;
    pointer-events: auto;
    -webkit-user-select: none;
    user-select: none;
}
.nav-center {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 2px;
}
.nav-avatar-wrap {
    position: relative;
    width: 40px; height: 40px;
}
.nav-avatar-wrap img {
    width: 40px; height: 40px;
    border-radius: 50%;
    object-fit: cover;
}
.online-dot {
    position: absolute;
    bottom: 1px; right: 1px;
    width: 10px; height: 10px;
    background: var(--green);
    border-radius: 50%;
    border: 2px solid #000;
}
.nav-name { font-size: 13px; font-weight: 600; }
.nav-status { font-size: 11px; color: var(--muted); }
.nav-actions { display: flex; gap: 8px; min-width: 60px; justify-content: flex-end; }

/* NAV BUTTONS */
.nav-icon-btn {
    width: 34px; height: 34px;
    border-radius: 50%;
    background: var(--bg3);
    border: none;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    touch-action: manipulation;
    pointer-events: auto;
    position: relative;
    z-index: 100;
    -webkit-appearance: none;
    appearance: none;
    outline: none;
    -webkit-user-select: none;
    user-select: none;
    transition: opacity 0.2s;
}
.nav-icon-btn:active { opacity: 0.7; transform: scale(0.94); }
.nav-icon-btn svg { width: 16px; height: 16px; fill: var(--text); pointer-events: none; }
.nav-icon-btn.voice-off { opacity: 0.35; }

/* PILLS */
.pills-wrap {
    padding: 8px 12px;
    overflow-x: auto;
    display: flex;
    gap: 6px;
    background: var(--bg);
    border-bottom: 0.5px solid var(--border);
    flex-shrink: 0;
    scrollbar-width: none;
    -webkit-overflow-scrolling: touch;
}
.pills-wrap::-webkit-scrollbar { display: none; }
.pill {
    padding: 6px 14px;
    border-radius: 20px;
    font-size: 13px;
    font-weight: 600;
    white-space: nowrap;
    background: var(--bg2);
    border: 1px solid;
    cursor: pointer;
    touch-action: manipulation;
    pointer-events: auto;
    flex-shrink: 0;
    -webkit-user-select: none;
    user-select: none;
    -webkit-appearance: none;
    appearance: none;
    outline: none;
    position: relative;
    z-index: 5;
}
.pill:active { opacity: 0.7; }
.pill.b { color: var(--accent); border-color: rgba(10,132,255,0.35); }
.pill.g { color: var(--green); border-color: rgba(48,209,88,0.35); }
.pill.p { color: var(--purple); border-color: rgba(191,90,242,0.35); }
.pill.o { color: var(--orange); border-color: rgba(255,159,10,0.35); }

/* CHAT */
.chat {
    flex: 1;
    overflow-y: auto;
    overflow-x: hidden;
    padding: 12px 12px 8px;
    display: flex;
    flex-direction: column;
    gap: 3px;
    -webkit-overflow-scrolling: touch;
    scrollbar-width: none;
}
.chat::-webkit-scrollbar { display: none; }

/* WELCOME CARD */
.wcard {
    background: var(--bg2);
    border-radius: 20px;
    padding: 20px 16px;
    margin-bottom: 8px;
    border: 0.5px solid var(--border);
    text-align: center;
}
.wcard-avatar {
    width: 72px; height: 72px;
    border-radius: 50%;
    object-fit: cover;
    border: 3px solid var(--accent);
    box-shadow: 0 0 24px rgba(10,132,255,0.4);
    margin-bottom: 10px;
}
.wcard h2 { font-size: 19px; font-weight: 700; margin-bottom: 5px; }
.wcard p { font-size: 13px; color: var(--muted); margin-bottom: 14px; line-height: 1.5; }
.wgrid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }

/* WELCOME GRID ITEMS */
.wgitem {
    background: var(--bg3);
    border-radius: 14px;
    padding: 12px 10px;
    font-size: 13px;
    font-weight: 500;
    display: flex;
    align-items: center;
    gap: 7px;
    cursor: pointer;
    touch-action: manipulation;
    pointer-events: auto;
    text-align: left;
    line-height: 1.3;
    border: none;
    color: var(--text);
    font-family: inherit;
    -webkit-appearance: none;
    appearance: none;
    outline: none;
    -webkit-user-select: none;
    user-select: none;
    position: relative;
    z-index: 5;
    width: 100%;
}
.wgitem:active { opacity: 0.7; transform: scale(0.97); }
.wgitem .icon { font-size: 20px; flex-shrink: 0; }

/* MESSAGES */
.mrow { display: flex; flex-direction: column; margin-bottom: 1px; }
.mrow.u { align-items: flex-end; }
.mrow.b { align-items: flex-start; }
.mwrap { display: flex; align-items: flex-end; gap: 6px; max-width: 88%; }
.mrow.u .mwrap { flex-direction: row-reverse; }
.bicon { width: 26px; height: 26px; border-radius: 50%; object-fit: cover; flex-shrink: 0; }
.bubble {
    padding: 9px 13px;
    border-radius: 18px;
    font-size: 15px;
    line-height: 1.5;
    word-break: break-word;
    animation: pop 0.18s cubic-bezier(0.34,1.56,0.64,1);
}
@keyframes pop { from { transform:scale(0.85); opacity:0; } to { transform:scale(1); opacity:1; } }
.mrow.b .bubble { background: var(--bg2); border-bottom-left-radius: 4px; }
.mrow.u .bubble { background: var(--accent); border-bottom-right-radius: 4px; }
.bubble pre { background:rgba(0,0,0,0.5); border-radius:8px; padding:10px; overflow-x:auto; margin:8px 0; font-size:12px; color:var(--green); font-family:monospace; white-space:pre-wrap; }
.bubble code { background:rgba(255,255,255,0.1); padding:1px 5px; border-radius:4px; font-size:12px; color:var(--green); font-family:monospace; }
.bubble pre code { background:none; padding:0; }
.bubble strong { color: #fff; }
.mtime { font-size: 10px; color: var(--muted); margin: 2px 4px 6px; }
.mrow.u .mtime { text-align: right; }

/* TYPING */
.trow { display: flex; align-items: flex-end; gap: 6px; margin-bottom: 4px; }
.tbub { background: var(--bg2); border-radius: 18px; border-bottom-left-radius: 4px; padding: 11px 14px; display: flex; gap: 4px; align-items: center; }
.tbub span { width: 7px; height: 7px; background: var(--muted); border-radius: 50%; animation: bn 1.3s infinite; }
.tbub span:nth-child(2) { animation-delay: .15s; }
.tbub span:nth-child(3) { animation-delay: .3s; }
@keyframes bn { 0%,60%,100%{transform:translateY(0);opacity:.4;} 30%{transform:translateY(-5px);opacity:1;} }

/* CAMERA */
.cam-preview {
    display: none;
    position: fixed;
    top: 0; left: 0; right: 0; bottom: 0;
    background: #000;
    z-index: 9999;
    flex-direction: column;
}
.cam-preview.active { display: flex; }
.cam-preview video { flex: 1; object-fit: cover; width: 100%; }
.cam-controls {
    display: flex;
    justify-content: space-around;
    align-items: center;
    padding: 20px;
    padding-bottom: calc(20px + var(--safe-bottom));
    background: #000;
}
.cam-btn {
    width: 56px; height: 56px;
    border-radius: 50%;
    border: none;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 24px;
    touch-action: manipulation;
    pointer-events: auto;
    -webkit-appearance: none;
    appearance: none;
    -webkit-user-select: none;
    user-select: none;
}
.cam-shutter { background: #fff; width: 70px; height: 70px; border: 4px solid rgba(255,255,255,0.5); }
.cam-close, .cam-flip { background: var(--bg3); }
.cam-btn:active { opacity: 0.7; }

/* INPUT AREA */
.input-area {
    padding: 8px 10px;
    padding-bottom: calc(8px + var(--safe-bottom));
    background: rgba(0,0,0,0.95);
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    border-top: 0.5px solid var(--border);
    flex-shrink: 0;
    position: relative;
    z-index: 20;
}
.chips-row {
    display: flex;
    gap: 6px;
    overflow-x: auto;
    padding-bottom: 7px;
    scrollbar-width: none;
    -webkit-overflow-scrolling: touch;
}
.chips-row::-webkit-scrollbar { display: none; }

/* CHIPS */
.chip {
    background: var(--bg2);
    border: 0.5px solid var(--border);
    color: var(--accent);
    padding: 7px 14px;
    border-radius: 18px;
    font-size: 13px;
    font-weight: 500;
    white-space: nowrap;
    font-family: inherit;
    cursor: pointer;
    touch-action: manipulation;
    pointer-events: auto;
    flex-shrink: 0;
    -webkit-appearance: none;
    appearance: none;
    outline: none;
    -webkit-user-select: none;
    user-select: none;
    position: relative;
    z-index: 20;
}
.chip:active { opacity: 0.7; background: var(--bg3); }

.irow {
    display: flex;
    align-items: flex-end;
    gap: 7px;
    background: var(--bg2);
    border-radius: 22px;
    padding: 5px 5px 5px 12px;
    border: 0.5px solid var(--border);
}
#inp {
    flex: 1;
    background: transparent;
    border: none;
    outline: none;
    color: var(--text);
    font-family: inherit;
    font-size: 16px;
    resize: none;
    max-height: 90px;
    min-height: 22px;
    line-height: 1.4;
    scrollbar-width: none;
    padding: 2px 0;
    -webkit-appearance: none;
}
#inp::placeholder { color: var(--muted); }
#inp::-webkit-scrollbar { display: none; }

/* INPUT BUTTONS */
.ibtn {
    width: 34px; height: 34px;
    border-radius: 50%;
    border: none;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    touch-action: manipulation;
    pointer-events: auto;
    flex-shrink: 0;
    transition: all 0.12s;
    -webkit-appearance: none;
    appearance: none;
    outline: none;
    -webkit-user-select: none;
    user-select: none;
    position: relative;
    z-index: 20;
}
.ibtn:active { opacity: 0.7; transform: scale(0.9); }
#sbtn { background: var(--accent); }
#sbtn svg { fill: white; width: 15px; height: 15px; pointer-events: none; }
#micBtn { background: var(--bg3); }
#micBtn svg { fill: var(--muted); width: 16px; height: 16px; pointer-events: none; }
#micBtn.listening { background: var(--red); }
#micBtn.listening svg { fill: white; }
#micBtn.speaking { background: var(--green); }
#micBtn.speaking svg { fill: white; }

@keyframes pulse-red {
    0%,100%{ box-shadow: 0 0 0 0 rgba(255,69,58,0.6); transform: scale(1); }
    50%{ box-shadow: 0 0 0 10px rgba(255,69,58,0); transform: scale(1.08); }
}
@keyframes pulse-green {
    0%,100%{ box-shadow: 0 0 0 0 rgba(48,209,88,0.6); transform: scale(1); }
    50%{ box-shadow: 0 0 0 10px rgba(48,209,88,0); transform: scale(1.08); }
}
#micBtn.listening { animation: pulse-red 1s infinite; }
#micBtn.speaking { animation: pulse-green 1.2s infinite; }

/* RECORDING OVERLAY */
.rec-overlay {
    display: none;
    position: fixed;
    bottom: 120px;
    left: 50%;
    transform: translateX(-50%);
    background: rgba(30,30,32,0.97);
    color: white;
    padding: 12px 24px;
    border-radius: 28px;
    font-size: 14px;
    font-weight: 600;
    z-index: 9999;
    border: 1px solid rgba(255,69,58,0.5);
    align-items: center;
    gap: 10px;
    white-space: nowrap;
    backdrop-filter: blur(20px);
    box-shadow: 0 8px 32px rgba(0,0,0,0.6);
}
.rec-overlay.active { display: flex; }
.rec-dot {
    width: 9px; height: 9px;
    background: var(--red);
    border-radius: 50%;
    animation: blink 1s infinite;
}
@keyframes blink { 0%,100%{opacity:1;} 50%{opacity:0.15;} }
</style>

// SYSTEM PROMPT
// ============================================
var SYSTEM = "You are Étienne, a charming French AI assistant specialized in coding and ethical hacking.\n" +
"Personality: witty, confident, charmingly French. Use phrases like 'Mon ami', 'Ooh là là', 'Magnifique!', 'Voilà!', 'Sacré bleu', 'Mais bien sûr!'. End messages with fun French signoffs.\n" +
"Expertise: ethical hacking, Python, JavaScript, Bash, network security, CTF, OSINT, SQLi, XSS, Metasploit, Nmap, Burp Suite, Linux, cryptography, Tor (educational), dark web awareness, network privacy, web development.\n" +
"Always emphasize ethical and legal use. Format code in markdown blocks. Never assist with illegal activities.";

var chatHistory = [{role:'system', content:SYSTEM}];

// ============================================
// AUDIO CONTEXT — unlock iOS audio on first touch
// ============================================
var audioCtx = null;
var audioUnlocked = false;

function unlockAudio() {
    if (audioUnlocked) return;
    try {
        audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        if (audioCtx.state === 'suspended') audioCtx.resume();
        audioUnlocked = true;
    } catch(e) { console.warn('AudioContext unlock failed:', e); }
}

document.addEventListener('touchstart', unlockAudio, {once: true, passive: true});
document.addEventListener('click', unlockAudio, {once: true, passive: true});

// ============================================
// GPT-4o API — max_tokens: 4000
// ============================================
async function callGPT(msg, isVoice) {
    var key = (typeof window._ETIENNE_KEY !== 'undefined') ? window._ETIENNE_KEY : '';
    if (!key) return "Mon Dieu! No API key found. Please add your key to config.js 🇫🇷";

    // Clone history and optionally add voice instruction
    var messages = chatHistory.map(function(m, i) {
        if (i === 0 && isVoice) {
            return {
                role: 'system',
                content: m.content + "\n\nIMPORTANT — this is a VOICE query. Respond in 2-4 short, natural spoken sentences. No markdown. No bullet points. No code blocks. Speak naturally as if in conversation."
            };
        }
        return m;
    });
    messages.push({role: 'user', content: msg});

    try {
        var res = await fetch('https://api.openai.com/v1/chat/completions', {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json',
                'Authorization': 'Bearer ' + key
            },
            body: JSON.stringify({
                model: 'gpt-4o',
                messages: messages,
                max_tokens: isVoice ? 300 : 4000,
                temperature: 0.85
            })
        });
        var data = await res.json();
        if (data.error) return "Mon Dieu! Error: " + data.error.message;
        var reply = data.choices[0].message.content;
        // Commit to real history
        chatHistory.push({role:'user', content: msg});
        chatHistory.push({role:'assistant', content: reply});
        return reply;
    } catch(e) {
        return "Sacré bleu! Network error, mon ami. Check your connection 🇫🇷";
    }
}

function fmtMD(t) {
    t = t.replace(/```(\w+)?\n?([\s\S]*?)```/g, '<pre><code>$2</code></pre>');
    t = t.replace(/`([^`]+)`/g, '<code>$1</code>');
    t = t.replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>');
    t = t.replace(/\*(.*?)\*/g, '<em>$1</em>');
    t = t.replace(/\n/g, '<br>');
    return t;
}

// ============================================
// OPENAI TTS — real voice through iPhone speaker
// ============================================
var voiceEnabled = true;
var isSpeaking = false;
var currentSource = null;

async function speakOpenAI(text) {
    if (!voiceEnabled) return;
    var key = (typeof window._ETIENNE_KEY !== 'undefined') ? window._ETIENNE_KEY : '';
    if (!key) return;

    // Strip HTML/markdown for clean speech
    var clean = text
        .replace(/<[^>]*>/g, ' ')
        .replace(/```[\s\S]*?```/g, ' code block. ')
        .replace(/`([^`]+)`/g, '$1')
        .replace(/\*\*(.*?)\*\*/g, '$1')
        .replace(/\*(.*?)\*/g, '$1')
        .replace(/#+\s/g, '')
        .replace(/\n+/g, ' ')
        .replace(/\s+/g, ' ')
        .trim();

    // Trim to ~600 chars, ending at a sentence
    if (clean.length > 600) {
        var cut = clean.substring(0, 600);
        var last = Math.max(cut.lastIndexOf('. '), cut.lastIndexOf('! '), cut.lastIndexOf('? '));
        clean = (last > 150) ? cut.substring(0, last + 1) : cut + '...';
    }

    if (!clean) return;

    setMicState('speaking');
    setNavStatus('🔊 Speaking…');
    isSpeaking = true;

    try {
        var res = await fetch('https://api.openai.com/v1/audio/speech', {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json',
                'Authorization': 'Bearer ' + key
            },
            body: JSON.stringify({
                model: 'tts-1',
                input: clean,
                voice: 'onyx',    // deep, rich masculine voice — perfect for Étienne
                speed: 0.94
            })
        });

        if (!res.ok) { throw new Error('TTS HTTP ' + res.status); }

        var arrayBuf = await res.arrayBuffer();

        // Ensure AudioContext is ready
        if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        if (audioCtx.state === 'suspended') await audioCtx.resume();

        var audioBuf = await audioCtx.decodeAudioData(arrayBuf);
        var source = audioCtx.createBufferSource();
        source.buffer = audioBuf;
        source.connect(audioCtx.destination);
        currentSource = source;

        source.onended = function() {
            isSpeaking = false;
            currentSource = null;
            setMicState('idle');
            setNavStatus('AI Hacking Assistant · GPT-4o');
        };

        source.start(0);

    } catch(e) {
        console.warn('OpenAI TTS failed, falling back to browser TTS:', e.message);
        speakFallback(clean);
    }
}

function stopSpeak() {
    isSpeaking = false;
    if (currentSource) {
        try { currentSource.stop(); } catch(e) {}
        currentSource = null;
    }
    if (window.speechSynthesis) window.speechSynthesis.cancel();
    setMicState('idle');
    setNavStatus('AI Hacking Assistant · GPT-4o');
}

// Fallback: browser speechSynthesis
function speakFallback(text) {
    if (!window.speechSynthesis) {
        isSpeaking = false;
        setMicState('idle');
        setNavStatus('AI Hacking Assistant · GPT-4o');
        return;
    }
    window.speechSynthesis.cancel();
    var u = new SpeechSynthesisUtterance(text.substring(0, 500));
    u.rate = 0.92; u.pitch = 0.85; u.volume = 1.0;
    // Pick a good English voice
    var voices = window.speechSynthesis.getVoices();
    var pref = ['Daniel', 'Google UK English Male', 'Alex', 'Fred'];
    for (var i = 0; i < pref.length; i++) {
        var v = voices.find(function(x) { return x.name === pref[i]; });
        if (v) { u.voice = v; break; }
    }
    u.onend = function() { isSpeaking = false; setMicState('idle'); setNavStatus('AI Hacking Assistant · GPT-4o'); };
    u.onerror = function() { isSpeaking = false; setMicState('idle'); setNavStatus('AI Hacking Assistant · GPT-4o'); };
    window.speechSynthesis.speak(u);
}

// ============================================
// OPENAI WHISPER STT — mic recording
// ============================================
var mediaRecorder = null;
var audioChunks = [];
var isRecording = false;

async function startRecording() {
    unlockAudio();
    try {
        var stream = await navigator.mediaDevices.getUserMedia({
            audio: {
                echoCancellation: true,
                noiseSuppression: true,
                sampleRate: 44100
            }
        });

        audioChunks = [];

        // Detect best supported mime type
        var mimeType = '';
        var candidates = ['audio/webm;codecs=opus', 'audio/webm', 'audio/mp4', 'audio/ogg'];
        for (var i = 0; i < candidates.length; i++) {
            if (MediaRecorder.isTypeSupported(candidates[i])) {
                mimeType = candidates[i];
                break;
            }
        }

        var opts = mimeType ? {mimeType: mimeType} : {};
        mediaRecorder = new MediaRecorder(stream, opts);

        mediaRecorder.ondataavailable = function(e) {
            if (e.data && e.data.size > 0) audioChunks.push(e.data);
        };

        mediaRecorder.onstop = function() {
            stream.getTracks().forEach(function(t) { t.stop(); });
            transcribeAudio();
        };

        mediaRecorder.start(200);
        isRecording = true;
        setMicState('listening');
        setNavStatus('🎤 Listening…');
        document.getElementById('recOverlay').classList.add('active');

    } catch(err) {
        console.error('Mic error:', err);
        alert('Microphone access denied.\n\nPlease go to Settings → Safari → Microphone and allow access, then try again.');
        isRecording = false;
        setMicState('idle');
    }
}

function stopRecording() {
    if (!isRecording || !mediaRecorder) return;
    isRecording = false;
    document.getElementById('recOverlay').classList.remove('active');
    setNavStatus('⏳ Transcribing…');
    try { mediaRecorder.stop(); } catch(e) {}
}

async function transcribeAudio() {
    var key = (typeof window._ETIENNE_KEY !== 'undefined') ? window._ETIENNE_KEY : '';
    if (!key || audioChunks.length === 0) {
        setMicState('idle');
        setNavStatus('AI Hacking Assistant · GPT-4o');
        return;
    }

    setMicState('speaking'); // green pulse = processing
    setNavStatus('⏳ Processing…');

    try {
        var mimeType = (audioChunks[0] && audioChunks[0].type) ? audioChunks[0].type.split(';')[0] : 'audio/webm';
        var ext = mimeType.includes('mp4') ? 'm4a' : mimeType.includes('ogg') ? 'ogg' : 'webm';
        var blob = new Blob(audioChunks, {type: mimeType});

        var fd = new FormData();
        fd.append('file', blob, 'voice.' + ext);
        fd.append('model', 'whisper-1');
        fd.append('language', 'en');

        var res = await fetch('https://api.openai.com/v1/audio/transcriptions', {
            method: 'POST',
            headers: {'Authorization': 'Bearer ' + key},
            body: fd
        });

        var data = await res.json();
        if (data.error) throw new Error(data.error.message);

        var transcript = (data.text || '').trim();
        if (!transcript) {
            setMicState('idle');
            setNavStatus('AI Hacking Assistant · GPT-4o');
            return;
        }

        // Show in text field
        var inp = document.getElementById('inp');
        if (inp) inp.value = transcript;

        setMicState('idle');
        // Send as voice message (shorter GPT response, no markdown)
        await doSend(transcript, true);

    } catch(e) {
        console.warn('Whisper failed:', e.message, '— falling back to browser STT');
        setMicState('idle');
        setNavStatus('AI Hacking Assistant · GPT-4o');
        tryBrowserSTT();
    }
}

// ============================================
// BROWSER STT FALLBACK
// ============================================
var recognition = null;

function tryBrowserSTT() {
    var SR = window.SpeechRecognition || window.webkitSpeechRecognition;
    if (!SR) return;
    if (!recognition) {
        recognition = new SR();
        recognition.continuous = false;
        recognition.interimResults = false;
        recognition.lang = 'en-US';
        recognition.onresult = function(e) {
            var t = e.results[0][0].transcript;
            setMicState('idle');
            var inp = document.getElementById('inp');
            if (inp) inp.value = t;
            doSend(t, true);
        };
        recognition.onerror = function() { setMicState('idle'); setNavStatus('AI Hacking Assistant · GPT-4o'); };
        recognition.onend = function() { setMicState('idle'); };
    }
    try { recognition.start(); setMicState('listening'); setNavStatus('🎤 Listening…'); } catch(e) {}
}

// ============================================
// MIC STATE & TOGGLE
// ============================================
function setMicState(state) {
    var btn = document.getElementById('micBtn');
    if (!btn) return;
    btn.className = 'ibtn';
    if (state === 'listening') btn.classList.add('listening');
    else if (state === 'speaking') btn.classList.add('speaking');
}

function toggleMic() {
    unlockAudio();
    if (isSpeaking) {
        // Tapping mic while speaking: stop playback
        stopSpeak();
        return;
    }
    if (isRecording) {
        // Tapping mic while recording: stop and transcribe
        stopRecording();
        return;
    }
    // Start new recording
    startRecording();
}

// ============================================
// NAV STATUS
// ============================================
function setNavStatus(txt) {
    var el = document.getElementById('navStatus');
    if (el) el.textContent = txt;
}

// ============================================
// CLOCK
// ============================================
function updateClock() {
    var el = document.getElementById('statusTime');
    if (!el) return;
    var now = new Date();
    var h = now.getHours() % 12 || 12;
    var m = now.getMinutes();
    el.textContent = h + ':' + (m < 10 ? '0' : '') + m;
}
updateClock();
setInterval(updateClock, 15000);

// ============================================
// CAMERA
// ============================================
var camStream = null;
var facingMode = 'environment';

function openCamera() {
    if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
        alert('Camera not available.');
        return;
    }
    navigator.mediaDevices.getUserMedia({video: {facingMode: facingMode}, audio: false})
        .then(function(stream) {
            camStream = stream;
            var v = document.getElementById('camVideo');
            if (v) v.srcObject = stream;
            var p = document.getElementById('camPreview');
            if (p) p.classList.add('active');
        })
        .catch(function() {
            alert('Camera access denied. Allow in Settings > Safari > Camera.');
        });
}

function closeCamera() {
    if (camStream) { camStream.getTracks().forEach(function(t){t.stop();}); camStream = null; }
    var p = document.getElementById('camPreview');
    if (p) p.classList.remove('active');
}

function flipCamera() {
    facingMode = (facingMode === 'environment') ? 'user' : 'environment';
    closeCamera();
    setTimeout(openCamera, 300);
}

function takePhoto() {
    var v = document.getElementById('camVideo');
    if (!v) return;
    var c = document.createElement('canvas');
    c.width = v.videoWidth || 640;
    c.height = v.videoHeight || 480;
    c.getContext('2d').drawImage(v, 0, 0);
    var img = c.toDataURL('image/jpeg', 0.8);
    closeCamera();
    var chat = document.getElementById('chat');
    if (!chat) return;
    var row = document.createElement('div');
    row.className = 'mrow u';
    var wrap = document.createElement('div');
    wrap.className = 'mwrap';
    var bub = document.createElement('div');
    bub.className = 'bubble';
    bub.style.cssText = 'padding:4px;background:#0a84ff;';
    bub.innerHTML = '<img src="' + img + '" style="max-width:200px;border-radius:12px;display:block;">';
    wrap.appendChild(bub);
    row.appendChild(wrap);
    chat.appendChild(row);
    chat.scrollTop = chat.scrollHeight;
    doSend('I just took a photo. What security elements should I be aware of in this environment?', false);
}

// ============================================
// CHAT UI
// ============================================
var BICO = '<img src="avatar.png" class="bicon" alt="É">';

function getTime() {
    return new Date().toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'});
}

function addMsg(text, isUser) {
    var chat = document.getElementById('chat');
    if (!chat) return;
    var row = document.createElement('div');
    row.className = 'mrow ' + (isUser ? 'u' : 'b');
    var wrap = document.createElement('div');
    wrap.className = 'mwrap';
    if (!isUser) {
        var ic = document.createElement('div');
        ic.innerHTML = BICO;
        wrap.appendChild(ic.firstChild);
    }
    var bub = document.createElement('div');
    bub.className = 'bubble';
    bub.innerHTML = isUser ? escHTML(text) : fmtMD(text);
    wrap.appendChild(bub);
    row.appendChild(wrap);
    var t = document.createElement('div');
    t.className = 'mtime';
    t.textContent = getTime();
    row.appendChild(t);
    chat.appendChild(row);
    chat.scrollTop = chat.scrollHeight;
}

function escHTML(s) {
    return s.replace(/&/g,'&').replace(/</g,'<').replace(/>/g,'>');
}

function showTyping() {
    hideTyping();
    var chat = document.getElementById('chat');
    if (!chat) return;
    var d = document.createElement('div');
    d.id = 'typing';
    d.className = 'trow';
    d.innerHTML = BICO + '<div class="tbub"><span></span><span></span><span></span></div>';
    chat.appendChild(d);
    chat.scrollTop = chat.scrollHeight;
}

function hideTyping() {
    var t = document.getElementById('typing');
    if (t) t.parentNode.removeChild(t);
}

async function doSend(text, isVoice) {
    if (!text || !text.trim()) return;
    text = text.trim();
    isVoice = !!isVoice;

    var chipsRow = document.getElementById('chipsRow');
    if (chipsRow) chipsRow.style.display = 'none';

    stopSpeak();
    addMsg(text, true);

    var inp = document.getElementById('inp');
    if (inp) { inp.value = ''; inp.style.height = 'auto'; }

    setNavStatus('⏳ Thinking…');
    showTyping();

    var reply = await callGPT(text, isVoice);
    hideTyping();
    addMsg(reply, false);

    if (voiceEnabled) {
        await speakOpenAI(reply);
    } else {
        setNavStatus('AI Hacking Assistant · GPT-4o');
    }
}

// ============================================
// INTRO SPEECH
// ============================================
async function doIntro() {
    var intro = "Bonjour mon ami! I am Étienne, your personal French hacking and coding assistant, powered by GPT-4o. I am here to help you with ethical hacking, Python, cybersecurity, OSINT, and much more. Ask me anything — I never disappoint! Voilà!";
    await speakOpenAI(intro);
}

// ============================================
// TAP HELPER — click + touchend
// ============================================
function tap(el, fn) {
    if (!el) return;
    el.addEventListener('click', function(e) {
        e.stopPropagation();
        fn(e);
    });
    el.addEventListener('touchend', function(e) {
        e.preventDefault();
        e.stopPropagation();
        fn(e);
    }, {passive: false});
}

// ============================================
// BIND ALL EVENTS
// ============================================
function bindEvents() {
    tap(document.getElementById('sbtn'), function() {
        var inp = document.getElementById('inp');
        if (inp) doSend(inp.value, false);
    });

    tap(document.getElementById('micBtn'), toggleMic);
    tap(document.getElementById('camBtn'), openCamera);
    tap(document.getElementById('camClose'), closeCamera);
    tap(document.getElementById('camShutter'), takePhoto);
    tap(document.getElementById('camFlip'), flipCamera);

    tap(document.getElementById('voiceToggle'), function() {
        voiceEnabled = !voiceEnabled;
        stopSpeak();
        var btn = document.getElementById('voiceToggle');
        if (btn) btn.classList.toggle('voice-off', !voiceEnabled);
    });

    var inp = document.getElementById('inp');
    if (inp) {
        inp.addEventListener('keydown', function(e) {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                doSend(this.value, false);
            }
        });
        inp.addEventListener('input', function() {
            this.style.height = 'auto';
            this.style.height = Math.min(this.scrollHeight, 90) + 'px';
        });
    }

    document.querySelectorAll('.pill[data-topic]').forEach(function(pill) {
        tap(pill, function() { doSend('Tell me about ' + pill.getAttribute('data-topic'), false); });
    });

    document.querySelectorAll('.wgitem[data-msg]').forEach(function(item) {
        tap(item, function() { doSend(item.getAttribute('data-msg'), false); });
    });

    document.querySelectorAll('.chip[data-msg]').forEach(function(chip) {
        tap(chip, function() { doSend(chip.getAttribute('data-msg'), false); });
    });
}

// ============================================
// INIT — intro plays on first user touch (iOS audio policy)
// ============================================
function init() {
    bindEvents();
    var introPlayed = false;
    function playIntroOnce() {
        if (introPlayed) return;
        introPlayed = true;
        unlockAudio();
        setTimeout(doIntro, 400);
    }
    document.addEventListener('touchend', playIntroOnce, {once: true, passive: true});
    document.addEventListener('click', playIntroOnce, {once: true, passive: true});
}

if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', init);
} else {
    init();
}

})(); // end IIFE
</script>
