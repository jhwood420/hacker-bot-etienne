<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
    <title>Étienne</title>
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Étienne">

<style>
:root {
    --safe-top: env(safe-area-inset-top, 47px);
    --safe-bottom: env(safe-area-inset-bottom, 34px);
    --accent: #0a84ff;
    --green: #30d158;
    --purple: #bf5af2;
    --orange: #ff9f0a;
    --red: #ff453a;
    --bg: #000;
    --bg2: #1c1c1e;
    --bg3: #2c2c2e;
    --text: #fff;
    --muted: #8e8e93;
    --border: rgba(255,255,255,0.1);
}
*, *::before, *::after {
    margin: 0; padding: 0;
    box-sizing: border-box;
    -webkit-tap-highlight-color: rgba(10,132,255,0.2);
    -webkit-touch-callout: none;
}
html, body {
    width: 100%; height: 100%;
    overflow: hidden;
    background: var(--bg);
}
body {
    font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Text', 'Helvetica Neue', sans-serif;
    color: var(--text);
    display: flex;
    flex-direction: column;
    height: 100vh;
    height: 100dvh;
    max-width: 430px;
    margin: 0 auto;
    position: relative;
}

/* STATUS BAR */
.status-bar {
    height: var(--safe-top);
    min-height: 47px;
    background: rgba(0,0,0,0.95);
    flex-shrink: 0;
    display: flex;
    align-items: flex-end;
    justify-content: space-between;
    padding: 0 20px 6px;
}
.status-time { font-size: 15px; font-weight: 700; }
.status-icons { display: flex; gap: 6px; align-items: center; }
.status-icons svg { width: 16px; height: 16px; fill: white; }

/* NAV BAR */
.nav {
    display: flex;
    align-items: center;
    padding: 8px 16px 10px;
    background: rgba(0,0,0,0.92);
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    border-bottom: 0.5px solid var(--border);
    flex-shrink: 0;
    gap: 12px;
    position: relative;
    z-index: 10;
}
.nav-back {
    color: var(--accent);
    font-size: 17px;
    display: flex;
    align-items: center;
    gap: 3px;
    min-width: 60px;
    cursor: pointer;
    touch-action: manipulation;
    pointer-events: auto;
    -webkit-user-select: none;
    user-select: none;
}
.nav-center {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 2px;
}
.nav-avatar-wrap {
    position: relative;
    width: 40px; height: 40px;
}
.nav-avatar-wrap img {
    width: 40px; height: 40px;
    border-radius: 50%;
    object-fit: cover;
}
.online-dot {
    position: absolute;
    bottom: 1px; right: 1px;
    width: 10px; height: 10px;
    background: var(--green);
    border-radius: 50%;
    border: 2px solid #000;
}
.nav-name { font-size: 13px; font-weight: 600; }
.nav-status { font-size: 11px; color: var(--muted); }
.nav-actions { display: flex; gap: 8px; min-width: 60px; justify-content: flex-end; }

/* NAV BUTTONS - ULTRA CLICKABLE */
.nav-icon-btn {
    width: 34px; height: 34px;
    border-radius: 50%;
    background: var(--bg3);
    border: none;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    touch-action: manipulation;
    pointer-events: auto;
    position: relative;
    z-index: 100;
    -webkit-appearance: none;
    appearance: none;
    outline: none;
    -webkit-user-select: none;
    user-select: none;
}
.nav-icon-btn:active { opacity: 0.7; transform: scale(0.94); }
.nav-icon-btn svg { width: 16px; height: 16px; fill: var(--text); pointer-events: none; }

/* PILLS */
.pills-wrap {
    padding: 8px 12px;
    overflow-x: auto;
    display: flex;
    gap: 6px;
    background: var(--bg);
    border-bottom: 0.5px solid var(--border);
    flex-shrink: 0;
    scrollbar-width: none;
    -webkit-overflow-scrolling: touch;
}
.pills-wrap::-webkit-scrollbar { display: none; }
.pill {
    padding: 6px 14px;
    border-radius: 20px;
    font-size: 13px;
    font-weight: 600;
    white-space: nowrap;
    background: var(--bg2);
    border: 1px solid;
    cursor: pointer;
    touch-action: manipulation;
    pointer-events: auto;
    flex-shrink: 0;
    -webkit-user-select: none;
    user-select: none;
    -webkit-appearance: none;
    appearance: none;
    outline: none;
    position: relative;
    z-index: 5;
}
.pill:active { opacity: 0.7; }
.pill.b { color: var(--accent); border-color: rgba(10,132,255,0.35); }
.pill.g { color: var(--green); border-color: rgba(48,209,88,0.35); }
.pill.p { color: var(--purple); border-color: rgba(191,90,242,0.35); }
.pill.o { color: var(--orange); border-color: rgba(255,159,10,0.35); }

/* CHAT */
.chat {
    flex: 1;
    overflow-y: auto;
    overflow-x: hidden;
    padding: 12px 12px 8px;
    display: flex;
    flex-direction: column;
    gap: 3px;
    -webkit-overflow-scrolling: touch;
    scrollbar-width: none;
}
.chat::-webkit-scrollbar { display: none; }

/* WELCOME CARD */
.wcard {
    background: var(--bg2);
    border-radius: 20px;
    padding: 20px 16px;
    margin-bottom: 8px;
    border: 0.5px solid var(--border);
    text-align: center;
}
.wcard-avatar {
    width: 72px; height: 72px;
    border-radius: 50%;
    object-fit: cover;
    border: 3px solid var(--accent);
    box-shadow: 0 0 24px rgba(10,132,255,0.4);
    margin-bottom: 10px;
}
.wcard h2 { font-size: 19px; font-weight: 700; margin-bottom: 5px; }
.wcard p { font-size: 13px; color: var(--muted); margin-bottom: 14px; line-height: 1.5; }
.wgrid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }

/* WELCOME GRID ITEMS - ULTRA CLICKABLE */
.wgitem {
    background: var(--bg3);
    border-radius: 14px;
    padding: 12px 10px;
    font-size: 13px;
    font-weight: 500;
    display: flex;
    align-items: center;
    gap: 7px;
    cursor: pointer;
    touch-action: manipulation;
    pointer-events: auto;
    text-align: left;
    line-height: 1.3;
    border: none;
    color: var(--text);
    font-family: inherit;
    -webkit-appearance: none;
    appearance: none;
    outline: none;
    -webkit-user-select: none;
    user-select: none;
    position: relative;
    z-index: 5;
    width: 100%;
}
.wgitem:active { opacity: 0.7; transform: scale(0.97); }
.wgitem .icon { font-size: 20px; flex-shrink: 0; }

/* MESSAGES */
.mrow { display: flex; flex-direction: column; margin-bottom: 1px; }
.mrow.u { align-items: flex-end; }
.mrow.b { align-items: flex-start; }
.mwrap { display: flex; align-items: flex-end; gap: 6px; max-width: 88%; }
.mrow.u .mwrap { flex-direction: row-reverse; }
.bicon { width: 26px; height: 26px; border-radius: 50%; object-fit: cover; flex-shrink: 0; }
.bubble {
    padding: 9px 13px;
    border-radius: 18px;
    font-size: 15px;
    line-height: 1.5;
    word-break: break-word;
    animation: pop 0.18s cubic-bezier(0.34,1.56,0.64,1);
}
@keyframes pop { from { transform:scale(0.85); opacity:0; } to { transform:scale(1); opacity:1; } }
.mrow.b .bubble { background: var(--bg2); border-bottom-left-radius: 4px; }
.mrow.u .bubble { background: var(--accent); border-bottom-right-radius: 4px; }
.bubble pre { background:rgba(0,0,0,0.5); border-radius:8px; padding:10px; overflow-x:auto; margin:8px 0; font-size:12px; color:var(--green); font-family:monospace; white-space:pre-wrap; }
.bubble code { background:rgba(255,255,255,0.1); padding:1px 5px; border-radius:4px; font-size:12px; color:var(--green); font-family:monospace; }
.bubble pre code { background:none; padding:0; }
.bubble strong { color: #fff; }
.mtime { font-size: 10px; color: var(--muted); margin: 2px 4px 6px; }
.mrow.u .mtime { text-align: right; }

/* TYPING */
.trow { display: flex; align-items: flex-end; gap: 6px; margin-bottom: 4px; }
.tbub { background: var(--bg2); border-radius: 18px; border-bottom-left-radius: 4px; padding: 11px 14px; display: flex; gap: 4px; align-items: center; }
.tbub span { width: 7px; height: 7px; background: var(--muted); border-radius: 50%; animation: bn 1.3s infinite; }
.tbub span:nth-child(2) { animation-delay: .15s; }
.tbub span:nth-child(3) { animation-delay: .3s; }
@keyframes bn { 0%,60%,100%{transform:translateY(0);opacity:.4;} 30%{transform:translateY(-5px);opacity:1;} }

/* CAMERA */
.cam-preview {
    display: none;
    position: fixed;
    top: 0; left: 0; right: 0; bottom: 0;
    background: #000;
    z-index: 9999;
    flex-direction: column;
}
.cam-preview.active { display: flex; }
.cam-preview video { flex: 1; object-fit: cover; width: 100%; }
.cam-controls {
    display: flex;
    justify-content: space-around;
    align-items: center;
    padding: 20px;
    padding-bottom: calc(20px + var(--safe-bottom));
    background: #000;
}
.cam-btn {
    width: 56px; height: 56px;
    border-radius: 50%;
    border: none;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 24px;
    touch-action: manipulation;
    pointer-events: auto;
    -webkit-appearance: none;
    appearance: none;
    -webkit-user-select: none;
    user-select: none;
}
.cam-shutter { background: #fff; width: 70px; height: 70px; border: 4px solid rgba(255,255,255,0.5); }
.cam-close, .cam-flip { background: var(--bg3); }
.cam-btn:active { opacity: 0.7; }

/* INPUT AREA */
.input-area {
    padding: 8px 10px;
    padding-bottom: calc(8px + var(--safe-bottom));
    background: rgba(0,0,0,0.95);
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    border-top: 0.5px solid var(--border);
    flex-shrink: 0;
    position: relative;
    z-index: 20;
}
.chips-row {
    display: flex;
    gap: 6px;
    overflow-x: auto;
    padding-bottom: 7px;
    scrollbar-width: none;
    -webkit-overflow-scrolling: touch;
}
.chips-row::-webkit-scrollbar { display: none; }

/* CHIPS - ULTRA CLICKABLE */
.chip {
    background: var(--bg2);
    border: 0.5px solid var(--border);
    color: var(--accent);
    padding: 7px 14px;
    border-radius: 18px;
    font-size: 13px;
    font-weight: 500;
    white-space: nowrap;
    font-family: inherit;
    cursor: pointer;
    touch-action: manipulation;
    pointer-events: auto;
    flex-shrink: 0;
    -webkit-appearance: none;
    appearance: none;
    outline: none;
    -webkit-user-select: none;
    user-select: none;
    position: relative;
    z-index: 20;
}
.chip:active { opacity: 0.7; background: var(--bg3); }

.irow {
    display: flex;
    align-items: flex-end;
    gap: 7px;
    background: var(--bg2);
    border-radius: 22px;
    padding: 5px 5px 5px 12px;
    border: 0.5px solid var(--border);
}
#inp {
    flex: 1;
    background: transparent;
    border: none;
    outline: none;
    color: var(--text);
    font-family: inherit;
    font-size: 16px;
    resize: none;
    max-height: 90px;
    min-height: 22px;
    line-height: 1.4;
    scrollbar-width: none;
    padding: 2px 0;
    -webkit-appearance: none;
}
#inp::placeholder { color: var(--muted); }
#inp::-webkit-scrollbar { display: none; }

/* INPUT BUTTONS - ULTRA CLICKABLE */
.ibtn {
    width: 34px; height: 34px;
    border-radius: 50%;
    border: none;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    touch-action: manipulation;
    pointer-events: auto;
    flex-shrink: 0;
    transition: all 0.12s;
    -webkit-appearance: none;
    appearance: none;
    outline: none;
    -webkit-user-select: none;
    user-select: none;
    position: relative;
    z-index: 20;
}
.ibtn:active { opacity: 0.7; transform: scale(0.9); }
#sbtn { background: var(--accent); }
#sbtn svg { fill: white; width: 15px; height: 15px; pointer-events: none; }
#micBtn { background: var(--bg3); }
#micBtn svg { fill: var(--muted); width: 16px; height: 16px; pointer-events: none; }
#micBtn.listening { background: var(--red); animation: pulse 1s infinite; }
#micBtn.listening svg { fill: white; }
#micBtn.speaking { background: var(--green); }
#micBtn.speaking svg { fill: white; }
@keyframes pulse { 0%,100%{transform:scale(1);} 50%{transform:scale(1.12);} }
</style>

<script>
(function() {
'use strict';

// ============================================
// SYSTEM PROMPT
// ============================================
var SYSTEM = "You are Étienne, a charming French AI assistant specialized in coding and ethical hacking.\n" +
"Personality: witty, confident, charmingly French. Use phrases like 'Mon ami', 'Ooh là là', 'Magnifique!', 'Voilà!', 'Sacré bleu', 'Mais bien sûr!'. End with fun French signoffs.\n" +
"Expertise: ethical hacking, Python, JavaScript, Bash, network security, CTF, OSINT, SQLi, XSS, Metasploit, Nmap, Burp Suite, Linux, cryptography, Tor (educational), dark web awareness, network privacy, web development.\n" +
"Always emphasize ethical and legal use. Format code in markdown blocks. Never assist with illegal activities.";

var chatHistory = [{role:'system', content:SYSTEM}];

// ============================================
// GPT-4o API
// ============================================
async function callGPT(msg) {
    var key = (typeof window._ETIENNE_KEY !== 'undefined') ? window._ETIENNE_KEY : '';
    if (!key) return "Mon Dieu! No API key found. Please add your key to config.js 🇫🇷";
    chatHistory.push({role:'user', content:msg});
    try {
        var res = await fetch('https://api.openai.com/v1/chat/completions', {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json',
                'Authorization': 'Bearer ' + key
            },
            body: JSON.stringify({
                model: 'gpt-4o',
                messages: chatHistory,
                max_tokens: 1000,
                temperature: 0.85
            })
        });
        var data = await res.json();
        if (data.error) return "Mon Dieu! Error: " + data.error.message;
        var reply = data.choices[0].message.content;
        chatHistory.push({role:'assistant', content:reply});
        return fmtMD(reply);
    } catch(e) {
        return "Sacré bleu! Network error, mon ami. Check your connection 🇫🇷";
    }
}

function fmtMD(t) {
    t = t.replace(/```(\w+)?\n?([\s\S]*?)```/g, '<pre><code>$2</code></pre>');
    t = t.replace(/`([^`]+)`/g, '<code>$1</code>');
    t = t.replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>');
    t = t.replace(/\*(.*?)\*/g, '<em>$1</em>');
    t = t.replace(/\n/g, '<br>');
    return t;
}

// ============================================
// CLOCK
// ============================================
function updateClock() {
    var el = document.getElementById('statusTime');
    if (!el) return;
    var now = new Date();
    var h = now.getHours(), m = now.getMinutes();
    h = h % 12 || 12;
    el.textContent = h + ':' + (m < 10 ? '0' : '') + m;
}
updateClock();
setInterval(updateClock, 15000);

// ============================================
// VOICE - TTS
// ============================================
var voiceEnabled = true;
var isSpeaking = false;
var selectedVoice = null;

function loadVoices() {
    if (!window.speechSynthesis) return;
    var voices = window.speechSynthesis.getVoices();
    var pref = ['Google UK English Male', 'Daniel', 'Alex', 'Microsoft David - English (United States)', 'Fred', 'Google US English'];
    for (var i = 0; i < pref.length; i++) {
        var v = voices.find(function(x) { return x.name === pref[i]; });
        if (v) { selectedVoice = v; return; }
    }
    selectedVoice = voices.find(function(v) { return v.lang && v.lang.startsWith('en'); }) || voices[0] || null;
}

if (window.speechSynthesis) {
    if (window.speechSynthesis.onvoiceschanged !== undefined) {
        window.speechSynthesis.onvoiceschanged = loadVoices;
    }
    loadVoices();
}

function speak(text) {
    if (!voiceEnabled || !window.speechSynthesis) return;
    window.speechSynthesis.cancel();
    var clean = text
        .replace(/<[^>]*>/g, '')
        .replace(/```[\s\S]*?```/g, 'code block')
        .replace(/&/g, 'and')
        .replace(/</g, 'less than')
        .replace(/>/g, 'greater than');
    if (clean.length > 500) clean = clean.substring(0, 500) + '...';
    var u = new SpeechSynthesisUtterance(clean);
    if (selectedVoice) u.voice = selectedVoice;
    u.rate = 0.92; u.pitch = 0.88; u.volume = 1.0;
    isSpeaking = true;
    setMicState('speaking');
    u.onend = function() { isSpeaking = false; setMicState('idle'); };
    u.onerror = function() { isSpeaking = false; setMicState('idle'); };
    window.speechSynthesis.speak(u);
}

function stopSpeak() {
    if (window.speechSynthesis) window.speechSynthesis.cancel();
    isSpeaking = false;
    setMicState('idle');
}

// ============================================
// VOICE - STT (Microphone)
// ============================================
var recognition = null;
var isListening = false;

function initRecognition() {
    var SR = window.SpeechRecognition || window.webkitSpeechRecognition;
    if (!SR) return false;
    recognition = new SR();
    recognition.continuous = false;
    recognition.interimResults = true;
    recognition.lang = 'en-US';
    recognition.onstart = function() { isListening = true; setMicState('listening'); };
    recognition.onresult = function(e) {
        var transcript = Array.from(e.results).map(function(r) { return r[0].transcript; }).join('');
        var inp = document.getElementById('inp');
        if (inp) inp.value = transcript;
        if (e.results[e.results.length - 1].isFinal) {
            isListening = false;
            setMicState('idle');
            doSend(transcript);
        }
    };
    recognition.onerror = function() { isListening = false; setMicState('idle'); };
    recognition.onend = function() { isListening = false; setMicState('idle'); };
    return true;
}

function setMicState(state) {
    var btn = document.getElementById('micBtn');
    if (!btn) return;
    btn.className = 'ibtn' + (state === 'listening' ? ' listening' : state === 'speaking' ? ' speaking' : '');
}

function toggleMic() {
    if (isSpeaking) { stopSpeak(); return; }
    if (!recognition) {
        var ok = initRecognition();
        if (!ok) { alert('Voice recognition not supported in this browser. Try Chrome or Safari on iOS.'); return; }
    }
    if (isListening) {
        recognition.stop();
    } else {
        stopSpeak();
        try { recognition.start(); } catch(e) { isListening = false; setMicState('idle'); }
    }
}

// ============================================
// CAMERA
// ============================================
var camStream = null;
var facingMode = 'environment';

function openCamera() {
    if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
        alert('Camera not available. Please allow camera access in Safari settings.');
        return;
    }
    navigator.mediaDevices.getUserMedia({ video: { facingMode: facingMode }, audio: false })
        .then(function(stream) {
            camStream = stream;
            var video = document.getElementById('camVideo');
            if (video) video.srcObject = stream;
            var preview = document.getElementById('camPreview');
            if (preview) preview.classList.add('active');
        })
        .catch(function() {
            alert('Camera access denied. Allow camera in Settings > Safari > Camera.');
        });
}

function closeCamera() {
    if (camStream) {
        camStream.getTracks().forEach(function(t) { t.stop(); });
        camStream = null;
    }
    var preview = document.getElementById('camPreview');
    if (preview) preview.classList.remove('active');
}

function flipCamera() {
    facingMode = facingMode === 'environment' ? 'user' : 'environment';
    closeCamera();
    setTimeout(openCamera, 300);
}

function takePhoto() {
    var video = document.getElementById('camVideo');
    if (!video) return;
    var canvas = document.createElement('canvas');
    canvas.width = video.videoWidth || 640;
    canvas.height = video.videoHeight || 480;
    canvas.getContext('2d').drawImage(video, 0, 0);
    var imgData = canvas.toDataURL('image/jpeg', 0.8);
    closeCamera();
    var chat = document.getElementById('chat');
    if (!chat) return;
    var row = document.createElement('div');
    row.className = 'mrow u';
    var wrap = document.createElement('div');
    wrap.className = 'mwrap';
    var bub = document.createElement('div');
    bub.className = 'bubble';
    bub.style.cssText = 'padding:4px;background:#0a84ff;';
    bub.innerHTML = '<img src="' + imgData + '" style="max-width:200px;border-radius:12px;display:block;">';
    wrap.appendChild(bub);
    row.appendChild(wrap);
    chat.appendChild(row);
    chat.scrollTop = chat.scrollHeight;
    doSend('I just took a photo. What security elements should I be aware of in this environment?');
}

// ============================================
// CHAT UI
// ============================================
var BICO = '<img src="avatar.png" class="bicon" alt="É">';

function getTime() {
    return new Date().toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'});
}

function addMsg(text, isUser) {
    var chat = document.getElementById('chat');
    if (!chat) return;
    var row = document.createElement('div');
    row.className = 'mrow ' + (isUser ? 'u' : 'b');
    var wrap = document.createElement('div');
    wrap.className = 'mwrap';
    if (!isUser) {
        var ic = document.createElement('div');
        ic.innerHTML = BICO;
        wrap.appendChild(ic.firstChild);
    }
    var bub = document.createElement('div');
    bub.className = 'bubble';
    if (isUser) { bub.textContent = text; } else { bub.innerHTML = text; }
    wrap.appendChild(bub);
    row.appendChild(wrap);
    var t = document.createElement('div');
    t.className = 'mtime';
    t.textContent = getTime();
    row.appendChild(t);
    chat.appendChild(row);
    chat.scrollTop = chat.scrollHeight;
}

function showTyping() {
    hideTyping();
    var chat = document.getElementById('chat');
    if (!chat) return;
    var d = document.createElement('div');
    d.id = 'typing';
    d.className = 'trow';
    d.innerHTML = BICO + '<div class="tbub"><span></span><span></span><span></span></div>';
    chat.appendChild(d);
    chat.scrollTop = chat.scrollHeight;
}

function hideTyping() {
    var t = document.getElementById('typing');
    if (t) t.parentNode.removeChild(t);
}

async function doSend(text) {
    if (!text || !text.trim()) return;
    text = text.trim();

    // Hide chips row and welcome card on first message
    var chips = document.getElementById('chipsRow');
    if (chips) chips.style.display = 'none';

    stopSpeak();
    addMsg(text, true);

    var inp = document.getElementById('inp');
    if (inp) { inp.value = ''; inp.style.height = 'auto'; }

    showTyping();
    var reply = await callGPT(text);
    hideTyping();
    addMsg(reply, false);
    if (voiceEnabled) speak(reply.replace(/<[^>]*>/g, ''));
}

// ============================================
// INTRO SPEECH
// ============================================
function doIntro() {
    var intro = "Bonjour mon ami! I am Étienne, your personal French hacking and coding assistant, powered by G P T 4. I am here to help you with ethical hacking, Python, cybersecurity, O S I N T, and much more. Ask me anything — I never disappoint! Voilà!";
    speak(intro);
}

// ============================================
// ATTACH ALL EVENTS — using both click and touchend
// ============================================
function tap(el, fn) {
    if (!el) return;
    el.addEventListener('click', function(e) {
        e.stopPropagation();
        fn(e);
    });
    el.addEventListener('touchend', function(e) {
        e.preventDefault();
        e.stopPropagation();
        fn(e);
    }, {passive: false});
}

function bindEvents() {
    // Send button
    tap(document.getElementById('sbtn'), function() {
        var inp = document.getElementById('inp');
        if (inp) doSend(inp.value);
    });

    // Mic button
    tap(document.getElementById('micBtn'), function() {
        toggleMic();
    });

    // Camera button
    tap(document.getElementById('camBtn'), function() {
        openCamera();
    });

    // Camera close
    tap(document.getElementById('camClose'), function() {
        closeCamera();
    });

    // Camera shutter
    tap(document.getElementById('camShutter'), function() {
        takePhoto();
    });

    // Camera flip
    tap(document.getElementById('camFlip'), function() {
        flipCamera();
    });

    // Voice toggle
    tap(document.getElementById('voiceToggle'), function() {
        voiceEnabled = !voiceEnabled;
        stopSpeak();
        var btn = document.getElementById('voiceToggle');
        if (btn) btn.style.opacity = voiceEnabled ? '1' : '0.35';
    });

    // Enter key in textarea
    var inp = document.getElementById('inp');
    if (inp) {
        inp.addEventListener('keydown', function(e) {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                doSend(this.value);
            }
        });
        inp.addEventListener('input', function() {
            this.style.height = 'auto';
            this.style.height = Math.min(this.scrollHeight, 90) + 'px';
        });
    }

    // PILLS — each pill is a button, direct event
    var pills = document.querySelectorAll('.pill[data-topic]');
    pills.forEach(function(pill) {
        tap(pill, function() {
            doSend('Tell me about ' + pill.getAttribute('data-topic'));
        });
    });

    // WELCOME GRID ITEMS — each is a button, direct event
    var wgItems = document.querySelectorAll('.wgitem[data-msg]');
    wgItems.forEach(function(item) {
        tap(item, function() {
            doSend(item.getAttribute('data-msg'));
        });
    });

    // CHIPS — each chip is a button, direct event
    var chips = document.querySelectorAll('.chip[data-msg]');
    chips.forEach(function(chip) {
        tap(chip, function() {
            doSend(chip.getAttribute('data-msg'));
        });
    });
}

// ============================================
// INIT — wait for DOM ready
// ============================================
function init() {
    bindEvents();
    setTimeout(doIntro, 1800);
}

// Guaranteed DOM ready
if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', init);
} else {
    init();
}

})(); // end IIFE
</script>
